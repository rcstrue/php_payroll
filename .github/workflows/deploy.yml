name: Deploy to Server

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate version info
        run: |
          echo "Version: 2.1.1" > build-info.txt
          echo "Last Update: $(TZ='Asia/Kolkata' date '+%d %b %Y %H:%M IST')" >> build-info.txt

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          server-dir: /hrms/
          local-dir: ./
          exclude: |
            .git/**
            .git-rewrite/**
            .github/**
            .gitignore
            .gitattributes
            node_modules/**
            **/*.md
            database/*.sql
            database/**
            install/**
            config/config.local.php
            upload/**
            skills/**
            .next/**
            next-env.d.ts
