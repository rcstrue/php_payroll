sonar.projectKey=rcstrue_php_payroll
sonar.organization=rcstrue

sonar.projectName=PHP Payroll
sonar.projectVersion=1.0

# Only analyze PHP files
sonar.sources=.

# Include only PHP files
sonar.inclusions=**/*.php

# Exclude non-PHP files (like Python if any)
sonar.exclusions=**/*.py,**/*.js,**/*.ts,**/*.html,**/*.css,vendor/**,node_modules/**,.github/**,database/**,upload/**,skills/**,.next/**

# Encoding
sonar.sourceEncoding=UTF-8

# PHP-specific settings
sonar.php.coverage.reportPaths=coverage.xml
sonar.php.tests.reportPath=phpunit.xml

# Test file patterns
sonar.test.inclusions=**/*Test.php,**/*test.php

# Quality gates
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
