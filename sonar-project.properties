sonar.projectKey=rcstrue_php_payroll
sonar.organization=rcstrue

sonar.projectName=PHP Payroll
sonar.projectVersion=1.0

# Only analyze PHP files
sonar.sources=.

# Include only PHP files
sonar.inclusions=**/*.php

# Exclude non-PHP files (like Python if any)
sonar.exclusions=**/*.py,**/*.js,**/*.ts,**/*.html,**/*.css,vendor/**,node_modules/**,.github/**,database/**,upload/**,skills/**,.next/**,download/**

# Encoding
sonar.sourceEncoding=UTF-8

# PHP-specific settings
sonar.php.coverage.reportPaths=coverage.xml
sonar.php.tests.reportPath=phpunit.xml

# Test file patterns
sonar.test.inclusions=**/*Test.php,**/*test.php

# Quality gates
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# ============================================
# Issue Exclusions (Won't Fix Items)
# ============================================

# Exclude SimpleXLSX.php from cognitive complexity checks (third-party library)
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=php:S3776
sonar.issue.ignore.multicriteria.e1.resourceKey=**/SimpleXLSX.php

# Exclude date format strings from duplication checks (standard patterns)
sonar.issue.ignore.multicriteria=e2
sonar.issue.ignore.multicriteria.e2.ruleKey=php:S1192
sonar.issue.ignore.multicriteria.e2.resourceKey=**/modules/**/*.php
sonar.issue.ignore.multicriteria.e2.linePattern=.*Y-m-d.*|.*d/m/Y.*|.*:offset.*|.*:limit.*

# Exclude page URL strings from duplication checks (standard navigation)
sonar.issue.ignore.multicriteria=e3
sonar.issue.ignore.multicriteria.e3.ruleKey=php:S1192
sonar.issue.ignore.multicriteria.e3.resourceKey=**/modules/**/*.php
sonar.issue.ignore.multicriteria.e3.linePattern=.*index\\.php\\?page=.*

# Exclude company name strings from duplication checks (standard branding)
sonar.issue.ignore.multicriteria=e4
sonar.issue.ignore.multicriteria.e4.ruleKey=php:S1192
sonar.issue.ignore.multicriteria.e4.resourceKey=**/modules/**/*.php
sonar.issue.ignore.multicriteria.e4.linePattern=.*RCS TRUE FACILITIES.*

# Exclude import error messages from duplication checks (standard messages)
sonar.issue.ignore.multicriteria=e5
sonar.issue.ignore.multicriteria.e5.ruleKey=php:S1192
sonar.issue.ignore.multicriteria.e5.resourceKey=**/modules/**/*.php
sonar.issue.ignore.multicriteria.e5.linePattern=.*Import failed.*

# Exclude settings/modules from page URL duplication checks
sonar.issue.ignore.multicriteria=e6
sonar.issue.ignore.multicriteria.e6.ruleKey=php:S1192
sonar.issue.ignore.multicriteria.e6.resourceKey=**/modules/settings/**/*.php
